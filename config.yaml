tokens:
  - symbol: "BTC/USDT"
    num_levels: 6
    min_step_usdt: 600
  - symbol: "ETH/USDT"
    num_levels: 6
    min_step_usdt: 30
  - symbol: "SOL/USDT"
    num_levels: 6
    min_step_usdt: 3

grid:
  total_capital_usdt: 5.0
  max_order_usdt: 1.0
  range_width_pct: 5.0

risk:
  max_daily_loss_usdt: 2.0
  max_open_orders: 10
  min_profit_per_trade_pct: 0.3
  min_order_usdt: 0.5
  min_order_btc: 0.00001  # Mínimo de OKX para BTC/USDT; SELLs con menos se omiten

market_analysis:
  candle_timeframe: "1h"
  candle_count: 24
  atr_period: 14
  sma_period: 20
  min_score_to_trade: 0.3
  vol_weight: 10.0
  spread_weight: 100.0
  hysteresis_margin: 0.20       # 20% mínimo de mejora para cambiar de par
  pair_eval_every_cycles: 10    # cada cuántos ciclos re-evaluar el par óptimo

exchange:
  sandbox: false

loop:
  interval_seconds: 5
  max_consecutive_errors: 5

trailing:
  recenter_every_cycles: 1440
  cooldown_cycles_after_error: 10  # Ciclos de espera tras recentrado fallido

logging:
  level: "INFO"
  file: "logs/bot.log"
  max_bytes: 10485760
  backup_count: 5
